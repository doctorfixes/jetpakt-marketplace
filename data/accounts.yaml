# JetPakt Pulse — client roster
#
# Each entry is one subscribing client. `cadence` drives when pulse_cron runs
# for this account; `tier` ties back to PRICING_MODEL.md §3 (ROS cadence map).
#
# Delivery routing:
#   delivery_mode: "client_cc_ryan"  — standard digest goes client-direct, Ryan CC'd
#   delivery_mode: "ryan_only"       — drafts land in Ryan's Outlook for manual forward
#   legal-flag alerts ALWAYS route ryan_only regardless of delivery_mode
#
# Scan module is the existing per-business scan file under denver_leadgen/; the
# pulse engine calls its *_scan() fixture function to get current-state data.

accounts:
  - account_id: big_daddys_colfax
    name: "Big Daddy's Pizza — West Colfax"
    tier: 3
    cadence: weekly
    scan_module: scan_big_daddys
    scan_fn: big_daddys_scan
    delivery_mode: client_cc_ryan
    client_email: ""              # CRM has no email; overrides to ryan_only until filled
    ryan_email: gojetpakt.us@outlook.com
    contract_started: 2026-04-18

  - account_id: hey_kiddo
    name: "Hey Kiddo"
    tier: 3
    cadence: weekly
    scan_module: scan_hey_kiddo
    scan_fn: hey_kiddo_scan
    delivery_mode: client_cc_ryan
    client_email: reservations@hk-oy.com
    ryan_email: gojetpakt.us@outlook.com
    contract_started: 2026-04-01

  - account_id: westrail
    name: "Westrail Tap & Grill"
    tier: 2
    cadence: monthly
    scan_module: scan_engine
    scan_fn: westrail_fixture
    delivery_mode: client_cc_ryan
    client_email: westrail.events@gmail.com
    ryan_email: gojetpakt.us@outlook.com
    contract_started: 2026-03-15
