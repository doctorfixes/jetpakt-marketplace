# Netlify build config for JetPakt — Bookkeeping Marketplace
# Serves the marketing site from site/ as a static deploy.
# API backend is deployed separately via Netlify Functions or external host.

[build]
  base    = "site"
  publish = "."

[build.environment]
  NETLIFY_USE_YARN = "false"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"
    Permissions-Policy    = "geolocation=(), microphone=(), camera=()"

# Long cache for CSS, short cache for HTML
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Redirects for the marketplace
[[redirects]]
  from = "/api/*"
  to   = "https://jetpakt-api.gojetpakt.com/:splat"
  status = 200

# DealScore SPA mounted under /dealscore/ — serve index.html for client routes
[[redirects]]
  from = "/dealscore/*"
  to   = "/dealscore/index.html"
  status = 200
